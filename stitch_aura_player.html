<style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            transition: all 0.5s ease;
        }
        
        .glass-panel:hover {
            transform: scale(1.02);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            background: rgba(255, 255, 255, 0.08);
            z-index: 30;
        }

        .glass-glow {
            box-shadow: 0 0 20px rgba(208, 188, 255, 0.15);
        }

        .hero-bg-layer {
            position: fixed;
            inset: 0;
            background-image: linear-gradient(to bottom, rgba(11, 19, 38, 0.3), rgba(11, 19, 38, 0.9)), url('https://lh3.googleusercontent.com/aida-public/AB6AXuDD2jeCq0m_aVZHmIZaz3uDsqYAJbrMzQlkMb-gcWyX-sX7BBZNBsDyAWdsjtYxqeDWjffQa2xAodOro4I7_6J3FxQ_BC4weyOZnC7hJTuB4tIC13I0BrGu5AE-dFexZPOuEWTcljRCPDJqA1qw-OeGlCfDOeXCVoNK8QhEgiKNm0x8X_L2brUqrBBUSWMwdU4Hq8nChUwXKBGKskwWpQm2BG5G8x8-Q11mDDYfi0-Zfh52jqVQJ212bfO3XljzkYgjJtJFmvH8udk');
            background-size: cover;
            background-position: center;
            opacity: 0.8;
            z-index: -1;
            mix-blend-mode: screen;
        }

        .shader-bg {
            position: fixed;
            inset: 0;
            z-index: -2;
            background: #000;
        }

        .progress-thumb {
            box-shadow: 0 0 10px rgba(208, 188, 255, 0.8);
        }

        .btn-bloom:hover {
            box-shadow: 0 0 20px rgba(208, 188, 255, 0.4);
        }

        .floating-anim {
            animation: float 6s ease-in-out infinite;
        }

        .floating-slow {
            animation: float 8s ease-in-out infinite;
        }

        .floating-slower {
            animation: float 10s ease-in-out infinite reverse;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        .shimmer {
            position: relative;
            overflow: hidden;
        }
        .shimmer::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0) 100%);
            transform: rotate(30deg);
            animation: shimmer-anim 3s infinite linear;
            pointer-events: none;
        }
        @keyframes shimmer-anim {
            0% { transform: translateX(-100%) rotate(30deg); }
            100% { transform: translateX(100%) rotate(30deg); }
        }

        @keyframes slideUpFade {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .animate-entrance {
            animation: slideUpFade 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
        }

        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 0 20px rgba(255, 255, 255, 0.2); }
            50% { box-shadow: 0 0 40px rgba(255, 255, 255, 0.6); }
        }

        .pulse-glow {
            animation: pulseGlow 2s infinite ease-in-out;
        }

        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }
        .delay-3 { animation-delay: 0.3s; }
        .delay-4 { animation-delay: 0.4s; }
    </style>
